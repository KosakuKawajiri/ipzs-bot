name: IPZS Sniper

concurrency:
  group: ipzs-sniper
  cancel-in-progress: true

on:
  schedule:
    # Dicembre → Maggio
    - cron: "*/6 6-21 * 12,1,2,3,4,5 *"
    # Giugno → Novembre
    - cron: "*/6 7-22 * 6,7,8,9,10,11 *"
  workflow_dispatch:

jobs:
  run:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - run: pip install -r requirements.txt

      - name: Avvia sniper
        run: python sniper_ipzs.py
        env:
          TELEGRAM_TOKEN: ${{ secrets.TELEGRAM_TOKEN }}
          CHAT_ID: ${{ secrets.CHAT_ID }}
          MTM_USERNAME: ${{ secrets.MTM_USERNAME }}
          MTM_PASSWORD: ${{ secrets.MTM_PASSWORD }}
          IPZS_USERNAME: ${{ secrets.IPZS_USERNAME }}
          IPZS_PASSWORD: ${{ secrets.IPZS_PASSWORD }}

      - name: Commit sniper_seen
        run: |
          git config --global user.name "bot"
          git config --global user.email "bot@github.com"
          git add seen.txt sniper_seen.json ipzs_flash_log.json
          git diff --cached --quiet || git commit -m "update seen files"
          git push || echo "push fallito"
